name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "release-please--branches--**"
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Python 3.7 syntax gate ──────────────────────────────────────────────
  # Blender 2.83 LTS embeds Python 3.7.7; pure-Python modules must remain
  # syntax-compatible with 3.7 through 2026-12-31.  This job runs
  # check_py37_syntax.py with a 3.7 interpreter to catch PEP 604 unions,
  # walrus operators, and other 3.8+ syntax.
  py37-syntax-check:
    name: py37 syntax check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.7"
      - name: Run py37 syntax check
        run: python tools/check_py37_syntax.py

  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install ruff
        run: pip install ruff>=0.8.0
      - name: Ruff check
        run: ruff check src/ tests/ tools/lint_skills.py packaging/assemble_zip.py packaging/addon_entry/__init__.py
      - name: Ruff format check
        run: ruff format --check src/ tests/ tools/lint_skills.py packaging/assemble_zip.py packaging/addon_entry/__init__.py

  lint-skills:
    name: Lint SKILL.md files
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install skill validation dependencies
        run: python -m pip install -e ".[dev]"
      - name: Install dcc-mcp-cli
        run: |
          export DCC_MCP_INSTALL_DIR="$RUNNER_TEMP/dcc-mcp-bin"
          curl -fsSL https://raw.githubusercontent.com/loonghao/dcc-mcp-core/main/scripts/install-cli.sh | bash
          echo "$RUNNER_TEMP/dcc-mcp-bin" >> "$GITHUB_PATH"
      - name: Validate SKILL.md and tool metadata
        run: python tools/lint_skills.py --warnings-as-errors

  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
        exclude:
          # Reduce CI time — only test 3.10 on linux
          - os: windows-latest
            python-version: "3.10"
          - os: macos-latest
            python-version: "3.10"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v --tb=short -m "not e2e and not packaging"

  # Ensure sdist/wheel build succeeds before release (PyPI / hatchling).
  build:
    name: Build package (wheel + sdist)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install build backend
        run: pip install --upgrade pip build hatchling
      - name: python -m build
        run: python -m build
      - name: Verify artifacts
        run: |
          ls -la dist/
          test -f dist/*.whl
          test -f dist/*.tar.gz

  addon-zip:
    name: Blender addon ZIP bundles dcc-mcp-core (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [win64, linux, macos]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install tooling
        run: pip install --upgrade pip packaging
      - name: Assemble addon ZIP
        run: python packaging/assemble_zip.py --platform ${{ matrix.platform }} --output-dir dist_addon/
      - name: Verify dcc-mcp-core wheel bundled in ZIP
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          python - <<'PY'
          import glob
          import os
          import re
          import zipfile

          platform = os.environ["PLATFORM"]
          zips = sorted(glob.glob(f"dist_addon/dcc_mcp_blender_addon_{platform}_v*.zip"))
          assert zips, f"expected dist_addon/dcc_mcp_blender_addon_{platform}_v*.zip"
          with zipfile.ZipFile(zips[-1]) as zf:
              names = zf.namelist()
          wheels = [n for n in names if n.startswith("wheels/") and n.endswith(".whl")]
          assert wheels, f"expected bundled .whl under wheels/, sample: {names[:30]}"
          assert not any(
              n.startswith("dcc_mcp_core/") for n in names
          ), "unexpected extracted dcc_mcp_core tree — use manifest wheels instead"
          assert "__init__.py" in names, names[:25]
          assert "server.py" in names, names[:25]
          assert "host.py" in names, names[:25]
          assert "blender_manifest.toml" in names, names[:25]
          nested = [n for n in names if n.startswith("dcc_mcp_blender/")]
          assert not nested, f"unexpected nested adapter package paths: {nested[:5]}"
          skill_md = [n for n in names if n.startswith("skills/") and n.endswith("/SKILL.md")]
          assert len(skill_md) >= 13, f"expected >=13 SKILL.md under skills/, got {len(skill_md)}"
          tools_yaml = [n for n in names if n.startswith("skills/") and n.endswith("/tools.yaml")]
          assert len(tools_yaml) >= 13, f"expected >=13 tools.yaml under skills/, got {len(tools_yaml)}"
          with zipfile.ZipFile(zips[-1]) as zf:
              raw = zf.read("blender_manifest.toml").decode("utf-8")
          assert "wheels = [" in raw and "./wheels/" in raw, raw[:400]
          assert raw.index("wheels = [") < raw.index("[permissions]"), raw
          manifest_wheels = re.findall(r'"./(wheels/dcc_mcp_core-[^"]+\.whl)"', raw)
          assert sorted(manifest_wheels) == sorted(wheels), (manifest_wheels, wheels)
          print(f"{platform}: manifest wheels={manifest_wheels}")
          PY
