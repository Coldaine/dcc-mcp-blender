name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name for manual addon ZIP build (for example v0.1.2). Leave empty to only run release-please."
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}${{ inputs.tag_name && format('-{0}', inputs.tag_name) || '' }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write
  actions: read

jobs:
  # ── 1. release-please ───────────────────────────────────────────────────────
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name || inputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── 2. build Python wheel ────────────────────────────────────────────────────
  build:
    name: Build wheel
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build hatchling

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # ── 3. publish to PyPI ───────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/dcc-mcp-blender
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true

  # ── 4. build Blender addon ZIP ───────────────────────────────────────────────
  build-addon-zip:
    name: Build Blender Addon ZIP (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: win64
            runner: windows-latest
            python-version: "3.11"
          - platform: linux
            runner: ubuntu-latest
            python-version: "3.11"
          - platform: macos
            runner: macos-latest
            python-version: "3.11"

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install packaging deps
        run: pip install requests packaging

      - name: Assemble addon ZIP
        shell: bash
        run: |
          python packaging/assemble_zip.py \
            --platform ${{ matrix.platform }} \
            --output-dir dist_addon/

      - name: Upload addon ZIP artifact
        uses: actions/upload-artifact@v7
        with:
          name: addon-zip-${{ matrix.platform }}
          path: dist_addon/*.zip

  # ── 5. attach wheel to GitHub Release ───────────────────────────────────────
  attach-wheel-release:
    name: Attach wheel to GitHub Release
    runs-on: ubuntu-latest
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Attach wheel and sdist to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/*

  # ── 6. attach addon ZIPs to GitHub Release ──────────────────────────────────
  attach-addon-release:
    name: Attach addon ZIPs to GitHub Release
    runs-on: ubuntu-latest
    needs: [release-please, build-addon-zip]
    if: needs.release-please.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
    permissions:
      contents: write
    steps:
      - name: Download addon ZIP artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist_addon/
          pattern: addon-zip-*
          merge-multiple: true

      - name: Attach addon ZIPs to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name || inputs.tag_name }}
          files: dist_addon/*.zip
