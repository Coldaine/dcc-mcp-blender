tools:
  - name: set_keyframe
    description: "Insert a keyframe on an object at the current or specified frame"
    source_file: scripts/set_keyframe.py
    execution: sync
    affinity: main
    read_only: false
    destructive: false
    idempotent: false
  - name: set_frame_range
    description: "Set the animation frame range (start and end frames)"
    source_file: scripts/set_frame_range.py
    execution: sync
    affinity: main
    read_only: false
    destructive: false
    idempotent: true
  - name: get_frame_range
    description: "Get the current animation frame range"
    source_file: scripts/get_frame_range.py
    execution: sync
    affinity: main
    read_only: true
    destructive: false
    idempotent: true
  - name: set_current_frame
    description: "Set the current animation frame"
    source_file: scripts/set_current_frame.py
    execution: sync
    affinity: main
    read_only: false
    destructive: false
    idempotent: true
  - name: get_keyframes
    description: "Return keyframe times grouped by f-curve for an object."
    source_file: scripts/get_keyframes.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      required: [object_name]
      properties:
        object_name:
          type: string
          minLength: 1
          description: Object name.
        data_path:
          type: string
          minLength: 1
          description: Optional f-curve data path filter.
    output_schema: &animation_result_schema
      type: object
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false
  - name: delete_keyframes
    description: "Delete keyframes on an object, optionally filtered by frame range and data path."
    source_file: scripts/delete_keyframes.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      required: [object_name]
      properties:
        object_name:
          type: string
          minLength: 1
          description: Object name.
        frame_range:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: number
          description: Optional [start, end] frame range to delete.
        data_path:
          type: string
          minLength: 1
          description: Optional f-curve data path filter.
    output_schema: *animation_result_schema
    read_only: false
    destructive: true
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: true
      idempotent_hint: true
      open_world_hint: false
  - name: bake_animation
    description: "Sample objects over a frame range by inserting explicit keyframes."
    source_file: scripts/bake_animation.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      required: [object_names, frame_start, frame_end]
      properties:
        object_names:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
          description: Objects to bake.
        frame_start:
          type: integer
          description: First frame to sample.
        frame_end:
          type: integer
          description: Last frame to sample.
        step:
          type: integer
          minimum: 1
          default: 1
          description: Sampling step in frames.
        data_paths:
          type: array
          items:
            type: string
            minLength: 1
          description: Optional data paths to key; defaults to transforms.
    output_schema: *animation_result_schema
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: false
