tools:
  - name: plan_extension_install
    description: "Inspect a local Blender add-on package, verify its checksum, and report package identity and compatibility without installing it."
    source_file: scripts/plan_extension_install.py
    execution: sync
    affinity: main
    timeout_hint_secs: 120
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      required: [package]
      properties:
        package:
          type: object
          additionalProperties: true
          required: [archive_path]
          properties:
            package_id: {type: string}
            archive_path: {type: string, minLength: 1}
            sha256: {type: string}
            package_kind: {type: string, enum: [auto, extension, legacy_addon], default: auto}
    output_schema:
      type: object
      additionalProperties: true
      required: [success]
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false
  - name: install_extension
    description: "Install a planned Blender extension or legacy add-on into a writable user repository, optionally enabling it."
    source_file: scripts/install_extension.py
    execution: sync
    affinity: main
    timeout_hint_secs: 180
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      required: [package]
      properties:
        package:
          type: object
          additionalProperties: true
          required: [archive_path]
          properties:
            package_id: {type: string}
            archive_path: {type: string, minLength: 1}
            sha256: {type: string}
            package_kind: {type: string, enum: [auto, extension, legacy_addon], default: auto}
        repository:
          type: string
          description: "Optional Blender user repository module; defaults to user_default or the first writable repository."
        enable: {type: boolean, default: false}
        overwrite: {type: boolean, default: false}
    output_schema:
      type: object
      additionalProperties: true
      required: [success]
    read_only: false
    destructive: true
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: true
      idempotent_hint: false
      open_world_hint: false
