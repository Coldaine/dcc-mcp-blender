tools:
  - name: import_file
    description: "Import an FBX or OBJ file using Blender-native import operators."
    source_file: scripts/import_file.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      required: [path]
      properties:
        path:
          type: string
          minLength: 1
          description: File path to import.
        format:
          type: string
          enum: [fbx, obj]
          description: Optional format override; inferred from extension when omitted.
        collection_name:
          type: string
          minLength: 1
          description: Optional collection for imported objects.
        options:
          type: object
          additionalProperties: true
          description: Blender operator options.
    output_schema: &interchange_result_schema
      type: object
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: true

  - name: import_fbx
    description: "Import an FBX file using Blender's FBX importer."
    source_file: scripts/import_fbx.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      required: [path]
      properties:
        path:
          type: string
          minLength: 1
          description: FBX file path.
        options:
          type: object
          additionalProperties: true
          description: Blender FBX import options.
    output_schema: *interchange_result_schema
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: true

  - name: import_obj
    description: "Import an OBJ file using Blender's OBJ importer."
    source_file: scripts/import_obj.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      required: [path]
      properties:
        path:
          type: string
          minLength: 1
          description: OBJ file path.
        options:
          type: object
          additionalProperties: true
          description: Blender OBJ import options.
    output_schema: *interchange_result_schema
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: true

  - name: import_usd
    description: "Import a USD/ USDA/USDC file using Blender's USD importer."
    source_file: scripts/import_usd.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      required: [path]
      properties:
        path:
          type: string
          minLength: 1
          description: File path to the USD/ USDA/USDC file.
        clear_scene:
          type: boolean
          description: If true, clear the existing scene before import.
        target_collection:
          type: string
          minLength: 1
          description: Optional collection for imported objects.
        return_summary:
          type: boolean
          description: If true, include object/material/mesh counts in the result.
        options:
          type: object
          additionalProperties: true
          description: >-
            Blender USD import operator options. Common keys: import_materials,
            import_animations, scale (float), import_cameras, import_curves,
            import_lights, import_meshes, import_subdiv, import_volumes,
            import_all_materials, read_mesh_uvs, read_mesh_colors,
            create_collection, light_intensity_scale.
    output_schema:
      type: object
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
          properties:
            filepath:
              type: string
            format:
              type: string
            collection_name:
              type: string
            imported_object_names:
              type: array
              items:
                type: string
            imported_count:
              type: integer
            elapsed_ms:
              type: number
            warnings:
              type: array
              items:
                type: string
            normalized_options:
              type: object
            summary:
              type: object
              properties:
                object_count:
                  type: integer
                object_types:
                  type: object
                mesh_count:
                  type: integer
                material_count:
                  type: integer
                collection_count:
                  type: integer
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: true

  - name: export_gltf
    description: "Export scene or selected objects to GLTF or GLB."
    source_file: scripts/export_gltf.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema: &export_schema
      type: object
      additionalProperties: false
      required: [path]
      properties:
        path:
          type: string
          minLength: 1
          description: Output file path.
        object_names:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
          description: Optional objects to export.
        options:
          type: object
          additionalProperties: true
          description: Blender export operator options.
    output_schema: *interchange_result_schema
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: true

  - name: export_usd
    description: "Export scene or selected objects to USD."
    source_file: scripts/export_usd.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema: *export_schema
    output_schema: *interchange_result_schema
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: true

  - name: export_alembic
    description: "Export scene or selected objects to Alembic with optional frame range."
    source_file: scripts/export_alembic.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      <<: *export_schema
      properties:
        path:
          type: string
          minLength: 1
          description: Output file path.
        object_names:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
          description: Optional objects to export.
        frame_range:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: integer
          description: Optional [start, end] frame range.
        options:
          type: object
          additionalProperties: true
          description: Blender Alembic export options.
    output_schema: *interchange_result_schema
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: true

  - name: batch_export
    description: "Run multiple exports, optionally applying a scene-stored export preset."
    source_file: scripts/batch_export.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: true
          description: Export item objects with path, format, object_names, options, and frame_range.
        preset_name:
          type: string
          minLength: 1
          description: Optional export preset name.
    output_schema: *interchange_result_schema
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: true
