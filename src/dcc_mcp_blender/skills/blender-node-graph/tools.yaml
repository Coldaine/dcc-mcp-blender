tools:
  - name: get_compositor_node_tree
    description: "Return the compositor node tree (nodes and links) for the current scene."
    source_file: scripts/get_compositor_node_tree.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      properties: {}
    output_schema: &graph_result_schema
      type: object
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    read_only: true
    destructive: false
    idempotent: true
    annotations: &read_only_annotations
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false

  - name: list_all_node_graphs
    description: "List all node graphs (material, geometry, compositor) in the scene."
    source_file: scripts/list_all_node_graphs.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      properties: {}
    output_schema: *graph_result_schema
    read_only: true
    destructive: false
    idempotent: true
    annotations: *read_only_annotations

  - name: list_compositor_nodes
    description: "List nodes in the compositor node tree."
    source_file: scripts/list_compositor_nodes.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      properties: {}
    output_schema: *graph_result_schema
    read_only: true
    destructive: false
    idempotent: true
    annotations: *read_only_annotations
