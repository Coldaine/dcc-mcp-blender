tools:
  - name: add_rigid_body
    description: "Add a rigid body physics component to an object."
    source_file: scripts/add_rigid_body.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      required: [object_name]
      properties:
        object_name:
          type: string
          minLength: 1
        body_type:
          type: string
          enum: [ACTIVE, PASSIVE]
          default: ACTIVE
        mass:
          type: number
          default: 1.0
        friction:
          type: number
          default: 0.5
        restitution:
          type: number
          default: 0.0
        collision_shape:
          type: string
          default: CONVEX_HULL
        properties:
          type: object
          additionalProperties: true
    output_schema:
      type: object
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: false

  - name: set_rigid_body_properties
