tools:
  - name: get_asset_metadata
    description: "Return object asset metadata and scene project context."
    source_file: scripts/get_asset_metadata.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      properties:
        object_name:
          type: string
          minLength: 1
    output_schema:
      type: object
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false

  - name: tag_asset_metadata
    description: "Merge metadata into a Blender object's local asset metadata."
    source_file: scripts/tag_asset_metadata.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      required: [object_name, metadata]
      properties:
        object_name:
          type: string
          minLength: 1
        metadata:
          type: object
          additionalProperties: true
    output_schema:
      type: object
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false

  - name: clear_asset_metadata
    description: "Clear selected asset metadata keys, or all metadata for an object."
    source_file: scripts/clear_asset_metadata.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      required: [object_name]
      properties:
        object_name:
          type: string
          minLength: 1
        keys:
          type: array
          items:
            type: string
    output_schema:
      type: object
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false

  - name: set_project_context
    description: "Store local project context on the current Blender scene."
    source_file: scripts/set_project_context.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        root:
          type: string
        unit_scale:
          type: number
        frame_rate:
          type: integer
        metadata:
          type: object
          additionalProperties: true
    output_schema:
      type: object
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false

  - name: create_publish_manifest
    description: "Write a local JSON publish manifest for selected objects."
    source_file: scripts/create_publish_manifest.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      required: [object_names, output_path]
      properties:
        object_names:
          type: array
          minItems: 1
          items:
            type: string
        output_path:
          type: string
          minLength: 1
        metadata:
          type: object
          additionalProperties: true
    output_schema:
      type: object
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: true

  - name: prepare_publish_package
    description: "Create a local publish package directory with a manifest."
    source_file: scripts/prepare_publish_package.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      required: [object_names, output_dir]
      properties:
        object_names:
          type: array
          minItems: 1
          items:
            type: string
        output_dir:
          type: string
          minLength: 1
        preset_name:
          type: string
    output_schema:
      type: object
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: true
