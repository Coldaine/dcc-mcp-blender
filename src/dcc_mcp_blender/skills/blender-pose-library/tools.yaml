tools:
  - name: list_poses
    description: "List poses saved on one armature or all armatures."
    source_file: scripts/list_poses.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      properties:
        armature_name:
          type: string
          minLength: 1
          description: Optional armature object name.
    output_schema: &pose_result_schema
      type: object
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false

  - name: save_pose
    description: "Save the current pose-bone transforms on an armature under a reusable pose name."
    source_file: scripts/save_pose.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      required: [armature_name, pose_name]
      properties:
        armature_name:
          type: string
          minLength: 1
          description: Armature object name.
        pose_name:
          type: string
          minLength: 1
          description: Pose name to save.
    output_schema: *pose_result_schema
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false

  - name: load_pose
    description: "Load a saved pose onto an armature, optionally mirrored left/right."
    source_file: scripts/load_pose.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      required: [armature_name, pose_name]
      properties:
        armature_name:
          type: string
          minLength: 1
          description: Armature object name.
        pose_name:
          type: string
          minLength: 1
          description: Saved pose name.
        mirror:
          type: boolean
          default: false
          description: Mirror left/right pose names and X-axis values.
    output_schema: *pose_result_schema
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false
