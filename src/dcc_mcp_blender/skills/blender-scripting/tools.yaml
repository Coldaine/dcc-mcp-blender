tools:
  - name: execute_python
    description: "Execute a Python code snippet inside Blender"
    source_file: scripts/execute_python.py
    execution: sync
    affinity: main
    input_schema:
      type: object
      additionalProperties: false
      required: [code]
      properties:
        code:
          type: string
          minLength: 1
          description: Python source code to execute inside Blender.
        context:
          type: object
          additionalProperties: true
          description: Optional variables injected into the execution namespace.
    read_only: false
    destructive: false
    idempotent: false
    role: escape_hatch
    risk: host_script_execution
    search_aliases: [python, script, custom, escape hatch, execute code, run python, bpy eval]
    intent: "Execute arbitrary Python code inside Blender's Python interpreter as a last-resort escape hatch."
    side_effects:
      modifies: true
      creates: true
      deletes: true
      file_output: true
      render: true
      ui_mutation: true
      targets: [arbitrary]
  - name: execute_script_file
    description: "Execute a Python script file inside Blender"
    source_file: scripts/execute_script_file.py
    execution: sync
    affinity: main
    input_schema:
      type: object
      additionalProperties: false
      required: [filepath]
      properties:
        filepath:
          type: string
          minLength: 1
          description: Absolute path to a Python script readable by Blender.
    read_only: false
    destructive: false
    idempotent: false
    role: escape_hatch
    risk: host_script_execution
    search_aliases: [python script file, run script file, execute py file, custom script]
    intent: "Execute a Python script file inside Blender's Python interpreter as a last-resort escape hatch."
    side_effects:
      modifies: true
      creates: true
      deletes: true
      file_output: true
      render: true
      ui_mutation: true
      targets: [arbitrary]
  - name: get_blender_info
    description: "Get Blender version and Python environment information"
    source_file: scripts/get_blender_info.py
    execution: sync
    affinity: main
    input_schema:
      type: object
      additionalProperties: false
      properties: {}
    read_only: true
    destructive: false
    idempotent: true
    role: read_only
    risk: low
    search_aliases: [blender version, python version, environment info, blender info]
    intent: "Retrieve Blender version and Python environment information for diagnostics."
