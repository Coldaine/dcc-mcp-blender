tools:
  - name: list_bake_targets
    description: "List mesh objects that are eligible for texture baking."
    source_file: scripts/list_bake_targets.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      properties:
        object_name:
          type: string
          minLength: 1
    output_schema: &result_schema
      type: object
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    read_only: true
    destructive: false
    idempotent: true
    annotations: &read_only
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false

  - name: bake_textures
    description: "Bake one or more maps for a mesh object into a local output directory."
    source_file: scripts/bake_textures.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      required: [object_name, maps, output_dir]
      properties:
        object_name:
          type: string
          minLength: 1
        maps:
          type: array
          minItems: 1
          items:
            type: string
        output_dir:
          type: string
          minLength: 1
        resolution:
          type: integer
          minimum: 1
          default: 512
        margin:
          type: integer
          minimum: 0
          default: 16
        dry_run:
          type: boolean
          default: false
    output_schema: *result_schema
    read_only: false
    destructive: false
    idempotent: false
    annotations: &disk_write
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: true

  - name: bake_ambient_occlusion
    description: "Bake ambient occlusion for a mesh object to one explicit local image path."
    source_file: scripts/bake_ambient_occlusion.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      required: [object_name, output_path]
      properties:
        object_name:
          type: string
          minLength: 1
        output_path:
          type: string
          minLength: 1
        settings:
          type: object
          additionalProperties: true
    output_schema: *result_schema
    read_only: false
    destructive: false
    idempotent: false
    annotations: *disk_write

  - name: bake_lighting
    description: "Bake lighting/combined contribution for a mesh object to one explicit local image path."
    source_file: scripts/bake_lighting.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      required: [object_name, output_path]
      properties:
        object_name:
          type: string
          minLength: 1
        output_path:
          type: string
          minLength: 1
        settings:
          type: object
          additionalProperties: true
    output_schema: *result_schema
    read_only: false
    destructive: false
    idempotent: false
    annotations: *disk_write

  - name: transfer_maps
    description: "Bake selected-to-active transfer maps from one mesh object to another."
    source_file: scripts/transfer_maps.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      required: [source_object, target_object, output_dir]
      properties:
        source_object:
          type: string
          minLength: 1
        target_object:
          type: string
          minLength: 1
        output_dir:
          type: string
          minLength: 1
        maps:
          type: array
          items:
            type: string
        resolution:
          type: integer
          minimum: 1
          default: 512
        margin:
          type: integer
          minimum: 0
          default: 16
        dry_run:
          type: boolean
          default: false
    output_schema: *result_schema
    read_only: false
    destructive: false
    idempotent: false
    annotations: *disk_write
