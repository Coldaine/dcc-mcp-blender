tools:
  - name: run_scene_checks
    description: "Run focused scene-level validation checks."
    source_file: scripts/run_scene_checks.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      properties:
        checks:
          type: array
          items:
            type: string
        object_names:
          type: array
          items:
            type: string
    output_schema:
      type: object
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false

  - name: validate_mesh
    description: "Validate one mesh object against geometry and optional pipeline rules."
    source_file: scripts/validate_mesh.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      required: [object_name]
      properties:
        object_name:
          type: string
          minLength: 1
        rules:
          type: object
          additionalProperties: true
    output_schema:
      type: object
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false

  - name: validate_materials
    description: "Validate material assignments and optional material rules."
    source_file: scripts/validate_materials.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      properties:
        object_names:
          type: array
          items:
            type: string
        rules:
          type: object
          additionalProperties: true
    output_schema:
      type: object
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false

  - name: validate_animation
    description: "Validate animation frame ranges and optional keyframe requirements."
    source_file: scripts/validate_animation.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      properties:
        object_names:
          type: array
          items:
            type: string
        frame_range:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: integer
        rules:
          type: object
          additionalProperties: true
    output_schema:
      type: object
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false

  - name: validate_export_readiness
    description: "Validate selected objects for a target export format."
    source_file: scripts/validate_export_readiness.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      required: [object_names, target_format]
      properties:
        object_names:
          type: array
          minItems: 1
          items:
            type: string
        target_format:
          type: string
          minLength: 1
        preset_name:
          type: string
        rules:
          type: object
          additionalProperties: true
    output_schema:
      type: object
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false

  - name: get_validation_report
    description: "Return a stored validation report by id, or the latest report."
    source_file: scripts/get_validation_report.py
    execution: sync
    affinity: main
    timeout_hint_secs: 0
    input_schema:
      type: object
      additionalProperties: false
      properties:
        report_id:
          type: string
    output_schema:
      type: object
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false
